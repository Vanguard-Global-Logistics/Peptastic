<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peptastic OS</title>

<style>
/* ====== BASE ====== */
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #08121F;
  color: white;
  overflow-x: hidden;
}

/* ====== LAYOUT ====== */
.app {
  display: flex;
  height: 100vh;
}

/* ====== SIDEBAR ====== */
.sidebar {
  width: 260px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  padding: 20px;
  border-right: 1px solid rgba(255,255,255,0.08);
}

.logo {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 30px;
  letter-spacing: 1px;
}

.nav a {
  display: block;
  color: #CBD5E1;
  text-decoration: none;
  padding: 10px 0;
  font-size: 14px;
  transition: 0.2s;
}

.nav a:hover {
  color: white;
}

/* ====== MAIN ====== */
.main {
  flex: 1;
  padding: 30px;
}

/* ====== TOP BAR ====== */
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
}

.title {
  font-size: 24px;
  font-weight: 600;
}

.status {
  color: #10B981;
  font-size: 13px;
}

/* ====== GRID ====== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

/* ====== CARDS ====== */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 16px;
  backdrop-filter: blur(20px);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.card h3 {
  margin: 0;
  font-size: 13px;
  color: #94A3B8;
}

.card p {
  font-size: 28px;
  margin-top: 10px;
  font-weight: 600;
}

/* AI CARD */
.ai {
  border: 1px solid #2563EB;
  position: relative;
  overflow: hidden;
}

.ai::before {
  content: "";
  position: absolute;
  width: 200px;
  height: 200px;
  background: rgba(37,99,235,0.2);
  filter: blur(40px);
  top: -50px;
  right: -50px;
}

/* ====== MOBILE ====== */
@media(max-width: 768px) {
  .sidebar {
    display: none;
  }
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">PEPTASTIC OS</div>

    <div class="nav">
      <a href="#">Dashboard</a>
      <a href="#">Patients</a>
      <a href="#">Appointments</a>
      <a href="#">Labs</a>
      <a href="#">Inventory</a>
      <a href="#">Billing</a>
      <a href="#">Analytics</a>
      <a href="#">AI Copilot</a>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <div class="title">Good Morning, Doctor</div>
      <div class="status">● AI Online</div>
    </div>

    <div class="grid">

      <div class="card">
        <h3>Revenue Today</h3>
        <p>$14,850</p>
      </div>

      <div class="card">
        <h3>Patients</h3>
        <p>24</p>
      </div>

      <div class="card">
        <h3>Appointments</h3>
        <p>18</p>
      </div>

      <div class="card">
        <h3>Inventory Status</h3>
        <p>Healthy</p>
      </div>

      <div class="card ai" id="aiCard">
        <h3>AI Copilot</h3>
        <p id="aiText">Click to activate assistant</p>
      </div>

    </div>

  </div>

</div>

<script>
const aiCard = document.getElementById("aiCard");
const aiText = document.getElementById("aiText");

const messages = [
  "Analyzing clinic performance...",
  "Checking today's schedule...",
  "Inventory levels are optimal.",
  "3 patients need follow-ups.",
  "Revenue is trending up 12%.",
  "AI Assistant Ready"
];

let i = 0;

aiCard.addEventListener("click", () => {
  aiText.innerText = messages[i];
  i = (i + 1) % messages.length;
});
</script>

</body>
</html>
