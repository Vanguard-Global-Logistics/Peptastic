<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Peptastic Voice AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#05070d;
  color:white;
  text-align:center;
}

.container {
  padding:20px;
}

button {
  padding:15px;
  border:none;
  border-radius:12px;
  background:#4da3ff;
  color:black;
  font-weight:bold;
  margin-top:20px;
}

.card {
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">
<h2>PEPTASTIC VOICE AI</h2>
<p>Clinical Copilot System</p>

<button onclick="startVoice()">🎤 Speak to AI</button>

<div class="card">
<p id="userText">Your request will appear here...</p>
<p id="aiResponse">AI response will appear here...</p>
</div>
</div>

<script>

// Voice Input
function startVoice(){
  let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

  recognition.lang = "en-US";
  recognition.start();

  recognition.onresult = function(event){
    let text = event.results[0][0].transcript;
    document.getElementById("userText").innerText = "You: " + text;

    sendToAI(text);
  }
}

// AI CALL (placeholder - connect API later)
async function sendToAI(text){

  document.getElementById("aiResponse").innerText = "Thinking...";

  // SIMULATED RESPONSE (replace with real API later)
  let response = await fakeAI(text);

  document.getElementById("aiResponse").innerText = "AI: " + response;
}

// SAFE CLINICAL RESPONSE ENGINE (demo logic)
function fakeAI(input){

  return new Promise(resolve => {

    let reply = "";

    if(input.toLowerCase().includes("lab")){
      reply = "Lab data detected. Summarizing trends and highlighting abnormal markers for provider review.";
    }
    else if(input.toLowerCase().includes("patient")){
      reply = "Accessing patient context. Displaying history timeline and recent clinical notes.";
    }
    else if(input.toLowerCase().includes("peptide")){
      reply = "Providing research summary only. Literature shows multiple studies exploring this compound. Clinical interpretation required.";
    }
    else {
      reply = "Request processed. This system provides clinical research summaries and patient data insights only.";
    }

    setTimeout(()=>resolve(reply), 1200);
  });
}

</script>

</body>
</html>
